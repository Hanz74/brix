name: buddy-extract-salary
version: "1.0.0"
description: >
  Extrahiert Gehalts-/Lohndaten (Brutto, Netto, Steuerklasse, SV-Beitraege,
  Arbeitgeber, Zeitraum) aus Buddy-Dokumenten via Mistral Batch API.
  Spezialist: gehalt_lohn.

input:
  source_pattern:
    type: str
    default: "%"
    description: "LIKE pattern for documents.source"
  limit:
    type: int
    default: 5000
    description: "Max documents to process"
  batch_size:
    type: int
    default: 500
    description: "Batch size for Mistral API"

error_handling:
  on_error: stop

steps:
  - id: extract
    type: python
    script: helpers/buddy_extract_salary.py
    params:
      source_pattern: "{{ input.source_pattern }}"
      limit: "{{ input.limit }}"
      batch_size: "{{ input.batch_size }}"
    on_error: stop

output:
  result: "{{ extract.output }}"
