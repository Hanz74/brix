name: buddy-extract-tax-hints
version: "1.0.0"
description: >
  Extrahiert Steuer-Hinweise aus Buddy-Dokumenten. Scannt zuerst per
  Regex nach Paragraph-Referenzen (§35a, §10b, §33 etc.), dann LLM
  fuer Kontext und Kategorisierung via Mistral Batch API.
  Spezialist: steuer_hinweise.

input:
  source_pattern:
    type: str
    default: "%"
    description: "LIKE pattern for documents.source"
  limit:
    type: int
    default: 5000
    description: "Max documents to process"
  batch_size:
    type: int
    default: 500
    description: "Batch size for Mistral API"

error_handling:
  on_error: stop

steps:
  - id: extract
    type: python
    script: helpers/buddy_extract_tax_hints.py
    params:
      source_pattern: "{{ input.source_pattern }}"
      limit: "{{ input.limit }}"
      batch_size: "{{ input.batch_size }}"
    on_error: stop

output:
  result: "{{ extract.output }}"
