name: buddy-extract-insurance
version: "1.0.0"
description: >
  Extrahiert Versicherungs-Policen-Details (Policennummer, Versicherungsart,
  Selbstbeteiligung, Deckungssumme, Praemie) aus Buddy-Dokumenten via Mistral Batch API.
  Spezialist: versicherung_details.

input:
  source_pattern:
    type: str
    default: "%"
    description: "LIKE pattern for documents.source"
  limit:
    type: int
    default: 5000
    description: "Max documents to process"
  batch_size:
    type: int
    default: 500
    description: "Batch size for Mistral API"

error_handling:
  on_error: stop

steps:
  - id: extract
    type: python
    script: helpers/buddy_extract_insurance.py
    params:
      source_pattern: "{{ input.source_pattern }}"
      limit: "{{ input.limit }}"
      batch_size: "{{ input.batch_size }}"
    on_error: stop

output:
  result: "{{ extract.output }}"
